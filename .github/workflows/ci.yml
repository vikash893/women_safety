name: AegisHer CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # ═══════════════════════════════════════════════════════
  #  1. Backend — Lint, Test, Build Verification
  # ═══════════════════════════════════════════════════════
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify server can load without crashing
        run: |
          timeout 10 node -e "
            process.env.PORT = 9999;
            process.env.MONGO_URL = 'mongodb://localhost:27017/test';
            process.env.ACCESS_TOKEN_SECRET = 'ci-test-secret';
            process.env.REFRESH_TOKEN_SECRET = 'ci-test-refresh';
            // Require main modules to verify no syntax/import errors
            require('./routes/userRoutes');
            require('./routes/emergencyRoutes');
            require('./routes/incidentRoutes');
            require('./routes/chatRoutes');
            require('./controllers/statsCntrl');
            require('./utils/riskEngine');
            require('./utils/matchingEngine');
            require('./utils/fakeAlertDetector');
            console.log('✅ All backend modules loaded successfully');
            process.exit(0);
          " || true

      - name: Check for security vulnerabilities
        run: npm audit --audit-level=high || true

  # ═══════════════════════════════════════════════════════
  #  2. Frontend — Lint, Build Verification
  # ═══════════════════════════════════════════════════════
  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          CI: true

      - name: Verify build output exists
        run: |
          if [ -d "build" ]; then
            echo "✅ Production build successful"
            ls -la build/
          else
            echo "❌ Build directory not found"
            exit 1
          fi

      - name: Check bundle size
        run: |
          BUNDLE_SIZE=$(du -sh build/ | cut -f1)
          echo "📦 Total bundle size: $BUNDLE_SIZE"

  # ═══════════════════════════════════════════════════════
  #  3. Docker — Build & Push Images
  # ═══════════════════════════════════════════════════════
  docker:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: aegisher-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: aegisher-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify docker-compose config
        run: docker compose -f docker-compose.yml config --quiet

  # ═══════════════════════════════════════════════════════
  #  4. Security Scan
  # ═══════════════════════════════════════════════════════
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          echo "🔍 Scanning for potential hardcoded secrets..."
          # Check for common secret patterns (excluding .env files and node_modules)
          FOUND=$(grep -rn --include="*.js" --include="*.jsx" \
            -E "(password|secret|api_key|token)\s*[:=]\s*['\"][^'\"]{8,}" \
            --exclude-dir=node_modules \
            backend/ frontend/src/ 2>/dev/null || true)
          
          if [ -n "$FOUND" ]; then
            echo "⚠️ Potential hardcoded secrets found (review manually):"
            echo "$FOUND"
          else
            echo "✅ No obvious hardcoded secrets detected"
          fi

      - name: Check .env is gitignored
        run: |
          if grep -q "\.env" backend/.gitignore 2>/dev/null; then
            echo "✅ .env is in backend .gitignore"
          else
            echo "⚠️ Warning: .env may not be gitignored in backend"
          fi
